version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./projects:/app/projects
      - ./backend/logs:/app/logs
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./aiyoutube.db
      - POLLINATIONS_ENDPOINT=https://image.pollinations.ai/prompt/
      - RETRY_DELAY=60
      - MAX_RETRIES=3
      - WORKER_COUNT=3
      - FFMPEG_PATH=ffmpeg
      - LOG_LEVEL=INFO
      - STORAGE_LOCATION=./projects
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  projects:
